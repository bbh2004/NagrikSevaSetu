name: civic
description: "NagrikSevaSetu - Civic Issue Reporting App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Firebase (Auth ONLY — Firestore removed) ──────────────────
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2

  # ── HTTP / Networking ─────────────────────────────────────────
  # dio: feature-rich HTTP client with interceptors for auth tokens
  dio: ^5.8.0+1
  http: ^1.5.0
  mime: ^2.0.0
  http_parser: ^4.1.2

  # ── State Management ──────────────────────────────────────────
  provider: ^6.1.5+1

  # ── Navigation ────────────────────────────────────────────────
  get: ^4.7.2

  # ── Device Features ───────────────────────────────────────────
  google_maps_flutter: ^2.17.1
  location: ^8.0.1
  image_picker: ^1.2.0
  geolocator: ^14.0.2

  # ── Audio Recording (Phase 2.3) ───────────────────────────────
  # 'record' — cross-platform audio recording for Android/iOS.
  # Chosen over flutter_sound for its simpler API and active maintenance.
  record: ^6.2.1
  # path_provider — resolves platform-specific temp/app directories
  # needed to save the audio file before uploading to Cloudinary.
  path_provider: ^2.1.4
  firebase_messaging: ^16.4.0
  flutter_local_notifications: ^22.0.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
