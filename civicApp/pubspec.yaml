name: civic
description: "NagrikSevaSetu - Civic Issue Reporting App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Firebase (Auth ONLY — Firestore removed) ──────────────────
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  google_sign_in: ^7.1.1

  # ── HTTP / Networking ─────────────────────────────────────────
  # dio: feature-rich HTTP client with interceptors for auth tokens
  dio: ^5.8.0+1
  http: ^1.5.0
  mime: ^2.0.0
  http_parser: ^4.1.2

  # ── State Management ──────────────────────────────────────────
  provider: ^6.1.5+1

  # ── Navigation ────────────────────────────────────────────────
  get: ^4.7.2

  # ── Device Features ───────────────────────────────────────────
  google_maps_flutter: 2.13.1
  location: ^8.0.1
  image_picker: ^1.2.0
  flutter_sound: ^9.28.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
